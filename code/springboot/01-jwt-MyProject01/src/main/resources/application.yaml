spring:
  application:
    name: MyProject01

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/dbstudy?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:dbuser}
    password: ${DB_PASSWORD:1234}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.study.myproject01.*.vo


# 학습용 localhost 기본값이다. 외부 배포에서는 환경변수로 덮어쓴다.
# JWT_SECRET은 HS256을 위해 32바이트 이상이어야 한다.
jwt:
  secret: ${JWT_SECRET:learning-only-local-jwt-secret-32bytes}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:300000}       # 5분
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:86400000}   # 1일

