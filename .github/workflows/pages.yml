name: Deploy docs + demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "code/react/01-basics-my-app01/**"
      - "code/react/02-zustand-my-app02/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 1) MkDocs Material notes site
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install "mkdocs-material>=9.5"
      - name: Build docs site
        run: mkdocs build --strict

      # 2) Static React demos
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            code/react/01-basics-my-app01/package-lock.json
            code/react/02-zustand-my-app02/package-lock.json
      - name: Build React basics demo
        working-directory: code/react/01-basics-my-app01
        env:
          PUBLIC_URL: /REACT/demo/react-basics
          REACT_APP_USE_HASH_ROUTER: "true"
          CI: "true"
        run: |
          npm ci
          npm run build
      - name: Build Zustand demo
        working-directory: code/react/02-zustand-my-app02
        env:
          PUBLIC_URL: /REACT/demo/zustand
          REACT_APP_USE_HASH_ROUTER: "true"
          CI: "true"
        run: |
          npm ci
          npm run build
      - name: Copy demos into site
        run: |
          mkdir -p site/demo/react-basics site/demo/zustand
          cp -r code/react/01-basics-my-app01/build/* site/demo/react-basics/
          cp -r code/react/02-zustand-my-app02/build/* site/demo/zustand/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
