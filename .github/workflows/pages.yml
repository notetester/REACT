name: Deploy docs + demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "code/react/02-zustand-my-app02/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1) MkDocs Material 노트 사이트 ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install "mkdocs-material>=9.5"
      - name: Build docs site
        run: mkdocs build   # → ./site

      # ── 2) Zustand 데모(my-app02) 빌드 후 /demo/zustand 에 배치 ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Zustand demo
        continue-on-error: true
        working-directory: code/react/02-zustand-my-app02
        env:
          PUBLIC_URL: /REACT/demo/zustand
          CI: "false"
        run: |
          # 서브경로 배포를 위해 BrowserRouter에 basename 주입(원본은 그대로, 빌드 시에만)
          sed -i 's|<BrowserRouter>|<BrowserRouter basename={process.env.PUBLIC_URL}>|' src/App.js
          npm ci
          npm run build
      - name: Copy demo into site
        continue-on-error: true
        run: |
          mkdir -p site/demo/zustand
          if [ -d code/react/02-zustand-my-app02/build ]; then
            cp -r code/react/02-zustand-my-app02/build/* site/demo/zustand/
            # SPA 새로고침 대비 폴백
            cp site/demo/zustand/index.html site/demo/zustand/404.html || true
          else
            echo "demo build not found — skipping demo"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
