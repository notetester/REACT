name: CI (build verification)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  react:
    name: React test + build · ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [01-basics-my-app01, 02-zustand-my-app02, 03-integration-my-app03]
    defaults:
      run:
        working-directory: code/react/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/react/${{ matrix.app }}/package-lock.json
      - run: npm ci
      - name: Test
        run: npm test
        env:
          CI: true
      - name: Build
        run: npm run build
        env:
          CI: true

  spring:
    name: Spring Boot build · ${{ matrix.proj }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        proj: [01-jwt-MyProject01, 02-integration-MyProject02]
    defaults:
      run:
        working-directory: code/springboot/${{ matrix.proj }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Gradle build + test
        run: ./gradlew clean build --no-daemon
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'learning-only-ci-jwt-secret-32bytes' }}
