name: CI (build verification)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  react:
    name: React build · ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [01-basics-my-app01, 02-zustand-my-app02, 03-integration-my-app03]
    defaults:
      run:
        working-directory: code/react/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/react/${{ matrix.app }}/package-lock.json
      - run: npm ci
      - name: Build (warnings는 실패 처리하지 않음)
        run: npm run build
        env:
          CI: false

  spring:
    name: Spring Boot build · ${{ matrix.proj }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        proj: [01-jwt-MyProject01, 02-integration-MyProject02]
    defaults:
      run:
        working-directory: code/springboot/${{ matrix.proj }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Gradle build (테스트 제외 · DB 불필요)
        run: ./gradlew clean build -x test --no-daemon
